eval_name: "sc2_native_mamba_genemamba_like_lung_large_eval"
seed: 42
device: "auto"

data:
  bulk_h5_path: "raw/archs4/human_gene_v2.5.h5"
  bulk_manifest_path: "processed/manifests/archs4_lung_large_pilot_manifest.parquet"
  sc_h5ad_path: "raw/census/census_large_lung_12ds_2500cpd.h5ad"
  sc_split_manifest_path: "processed/splits/census_large_lung_12ds_2500cpd_manifest_with_splits.parquet"
  pseudobulk_h5ad_path: "processed/pseudobulk/census_large_lung_12ds_2500cpd_pseudobulk.h5ad"
  shared_gene_table_path: "artifacts/gene_tables/census_archs4_shared_genes.tsv"
  n_genes: 4096
  log1p_input: true
  bulk_mask_prob: 0.15
  bulk_noise_std: 0.0
  sc_mask_prob: 0.15
  sc_noise_std: 0.0
  pb_mask_prob: 0.15
  pb_noise_std: 0.0
  bulk_batch_size: 16
  sc_batch_size: 16
  pb_batch_size: 8
  num_workers: 4

model:
  kind: "native_mamba_bridge"
  d_model: 128
  n_layers: 4
  d_state: 8
  d_conv: 4
  expand: 1
  dropout: 0.1
  mixer_type: "mamba1"
  bidirectional: true
  merge_mode: "gate"
  smart_flip: false
  rank_input: true
  preserve_prefix_tokens: 0
  norm_type: "rmsnorm"

eval:
  checkpoint_path: "sc2_native_mamba_genemamba_like_lung_large/checkpoints/best.pt"