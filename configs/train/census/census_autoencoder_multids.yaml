run_name: "census_autoencoder_multids_lung"
seed: 42
device: "auto"

data:
  h5ad_path: "raw/census/census_multi_dataset_lung_5ds_1000cpd.h5ad"
  split_manifest_path: "processed/splits/census_multi_dataset_lung_5ds_1000cpd_manifest_with_splits.parquet"
  n_genes: 2048
  log1p_input: true
  batch_size: 64
  num_workers: 0

model:
  hidden_dims: [512, 128]
  dropout: 0.1

train:
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0