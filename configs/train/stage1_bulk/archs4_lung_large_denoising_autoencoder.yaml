run_name: "archs4_lung_large_denoising_autoencoder"
seed: 42
device: "auto"

data:
  h5_path: "raw/archs4/human_gene_v2.5.h5"
  sample_manifest_path: "processed/manifests/archs4_lung_large_pilot_manifest.parquet"
  shared_gene_table_path: "artifacts/gene_tables/census_archs4_shared_genes.tsv"
  n_genes: 4096
  log1p_input: true
  mask_prob: 0.15
  noise_std: 0.0
  batch_size: 32
  num_workers: 0

model:
  hidden_dims: [1024, 256]
  dropout: 0.1

train:
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0